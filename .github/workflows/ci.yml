name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/Dockerfile
          config: .hadolint.yaml

  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: false
          load: true
          tags: app:test

      - name: Start container
        run: docker run -d -p 8080:80 --name app-test app:test

      - name: Wait for container to be ready
        run: |
          for i in $(seq 1 10); do
            curl -sf http://localhost:8080 && echo "Container ready" && break
            echo "Attempt $i — retrying in 2s..."
            sleep 2
          done

      - name: Verify HTTP 200 response
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:8080)
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "200" ]

      - name: Verify HTML content
        run: curl -sf http://localhost:8080 | grep -q "Hello, World!"

      - name: Stop and remove container
        if: always()
        run: docker stop app-test && docker rm app-test

  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
      security-events: write  # required to upload SARIF results

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: false
          load: true
          tags: app:scan

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: app:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"        # fail the job if CRITICAL or HIGH CVEs are found
          ignore-unfixed: true   # only flag CVEs that have a fix available

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()            # upload even if the scan step fails
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container
